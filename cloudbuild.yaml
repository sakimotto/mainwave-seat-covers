steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/mainwave/mainwave-seat-covers:$SHORT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/mainwave/mainwave-seat-covers:latest"
      - "."

  # Push the Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/mainwave/mainwave-seat-covers:$SHORT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "mainwave-seat-covers"
      - "--image=us-central1-docker.pkg.dev/$PROJECT_ID/mainwave/mainwave-seat-covers:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=300"
      - "--set-secrets=DATABASE_URL=neon-db-url:latest"
      - "--set-secrets=LLM_API_KEY=deepseek-api-key:latest"
      - "--set-env-vars=LLM_BASE_URL=https://api.deepseek.com/v1"
      - "--set-env-vars=LLM_MODEL=deepseek-chat"
      - "--set-env-vars=DATABASE_DRIVER=neon"
      - "--set-env-vars=NODE_ENV=production"

substitutions:
  _REGION: us-central1

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
